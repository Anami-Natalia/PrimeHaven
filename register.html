<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register Here- PrimeHaven</title>

     <link rel="stylesheet" href="css/register.css">
</head>

<body>
    

<form action="">

    <legend><marquee behavior="" direction="">Join us and start your journey today!!!</marquee></legend> <br><br>

    <label for="fname">First Name</label>
    <input type="text" placeholder="Enter firstname" id="fname" required > <br><br>

    <label for="sname">Surname</label>
<input type="text" placeholder="Enter surname" id="sname" required> <br><br>

<label for="email">Email Address</label>
<input type="email" placeholder="e.g abc@gmail.com" id="email" required> <br><br>

<label for="pwd"> Password</label>
<input type="password" placeholder="Enter Password" id="pwd" required> <br><br>

<label for="phone"> Phone number</label>
<input type="tel" placeholder="e.g 0798765432" id="phone" required> <br><br>

<label for="yob"> Year Of Birth</label>
<input type="date" id="yob" required> <br><br>

<label for="dt"> Date and time</label>
<input type="datetime-local" id="dt" required> <br><br>

<label for="file"> Upload file</label>
<input type="file" id="file" required> <br><br>

<label for="nationality"> Select Nationality</label>

<!--dropdown-->

<select name="" id="nationality">

    <option value="" disabled>--Select one--</option>
<option value="">Italian</option>
<option value="">German</option>
<option value="">French</option>
<option value="">Spanish</option>

</select>

<!--End of dropdown-->
<br><br>

<label>Select Gender</label> <br>

<input type="radio" id="male" name="gender">
<label for="male">Male</label> <br>

<input type="radio" id="Female" name="gender">
<label for="FEmale">Female</label> <br>

<input type="radio" id="other" name="gender">
<label for="Other">Other</label> <br>

<br>

<label>Choose web programming languages</label> <br><br>

<input type="checkbox" id="php" name="php">
<label for="php">PHP</label> <br>

<input type="checkbox" id="python" name="python">
<label for="python">Python</label> <br>

<input type="checkbox" id="SWIFT" name="swift">
<label for="swift">Swift</label> <br><br>

<label for="message">Message</label><br><br>
<textarea name="" id="message" cols="100" rows="20" placeholder="type here"></textarea> <br><br>

<button type="submit"> begin here</button>







</form>





</body>
</html>
